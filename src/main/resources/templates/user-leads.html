<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>User Leads</title>

<link rel="manifest" href="/manifest.json">
   <meta name="theme-color" content="#0d6efd">


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:#f5f7fb;
    overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
    height:100vh;
    position:fixed;
    width:220px;
    left:0;
    top:0;
    background:#212529;
    color:white;
    padding:20px;
}

.sidebar a{
    color:white;
    text-decoration:none;
    display:block;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
}

.sidebar a:hover{
    background:#0d6efd;
}

/* MAIN */

.main{
    margin-left:220px;
}

/* TOPBAR */

.topbar{
    background:white;
    padding:15px 20px;
    border-radius:12px;
    box-shadow:0px 2px 10px rgba(0,0,0,0.08);
}

/* TABLE BOX */

.table-box{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
    box-shadow:0px 2px 10px rgba(0,0,0,0.08);
}

.table th,
.table td{
    vertical-align:middle;
}

@media(max-width:768px){

    .sidebar{
        position:relative;
        width:100%;
        height:auto;
    }

    .main{
        margin-left:0;
    }

}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

    <!-- SIDEBAR -->

    <div class="col-md-2 sidebar">

        <h3 class="mb-4">CRM Panel</h3>

        <a href="/dashboard">
            <i class="bi bi-speedometer2"></i>
            Dashboard
        </a>

        <a href="/addLead">
            <i class="bi bi-person-plus"></i>
            Add Lead
        </a>

        <a href="/customers">
            <i class="bi bi-people"></i>
            Customers
        </a>

        <a href="/reports">
            <i class="bi bi-bar-chart"></i>
            Reports
        </a>

        <a href="/logout">
            <i class="bi bi-box-arrow-right"></i>
            Logout
        </a>

    </div>

    <!-- MAIN CONTENT -->

    <div class="col-md-10 main p-4">

        <!-- TOPBAR -->

        <div class="topbar d-flex justify-content-between align-items-center">

            <div>

                <h3 class="fw-bold mb-0">
                    Employee Leads
                </h3>

                <small class="text-muted">
                    Employee Lead Management
                </small>

            </div>

            <div>

                <h5 class="mb-0">
                    Welcome,
                    <span th:text="${username}"></span>
                </h5>

            </div>

        </div>

        <!-- TABLE -->

        <div class="table-box">

            <div class="d-flex justify-content-between align-items-center mb-3">

                <h4>
                    Assigned Leads
                </h4>

                <a href="/dashboard"
                   class="btn btn-dark">

                    Back

                </a>

            </div>

            <div class="table-responsive">

                <table class="table table-hover table-bordered">

                    <thead class="table-dark">

                        <tr>

                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th>Source</th>
                            <th>Follow Up</th>
							<th>Actions</th>
							


                        </tr>

                    </thead>

                    <tbody>

                        <!-- EMPTY -->

                        <tr th:if="${#lists.isEmpty(leads)}">

                            <td colspan="7"
                                class="text-center text-muted">

                                No Leads Found

                            </td>

                        </tr>

                        <!-- LEADS -->

                        <tr th:each="lead : ${leads}">

                            <td th:text="${lead.id}"></td>

                            <td th:text="${lead.name}"></td>

                            <td th:text="${lead.email}"></td>

                            <td th:text="${lead.phone}"></td>

                            <td>

                                <span th:switch="${lead.status}">

                                    <span th:case="'New'"
                                          class="badge bg-primary">

                                          New

                                    </span>

                                    <span th:case="'Contacted'"
                                          class="badge bg-warning text-dark">

                                          Contacted

                                    </span>

                                    <span th:case="'Qualified'"
                                          class="badge bg-success">

                                          Qualified

                                    </span>

                                    <span th:case="'Converted'"
                                          class="badge bg-info">

                                          Converted

                                    </span>

                                    <span th:case="'Lost'"
                                          class="badge bg-danger">

                                          Lost

                                    </span>

                                    <span th:case="*"
                                          class="badge bg-secondary"
                                          th:text="${lead.status}">
                                    </span>

                                </span>

                            </td>

                            <td th:text="${lead.source}"></td>

                            <td th:text="${lead.followUpDate}"></td>

							<td>

							    <a th:href="@{/lead-details/{id}(id=${lead.id})}"
							       class="btn btn-info btn-sm">

							        <i class="bi bi-eye"></i>
							        View Details

							    </a>

							</td>
							
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

</div>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('Service Worker Registered'))
        .catch(err => console.log(err));
}
</script>


</body>
</html>
