<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lead Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:#f5f7fb;
}

/* BOX */

.box{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0px 2px 10px rgba(0,0,0,0.08);
    margin-top:20px;
}

/* NOTE */

.note-box{
    background:#f8f9fa;
    border-left:4px solid #0d6efd;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

</style>

</head>

<body>

<div class="container mt-4">

    <!-- TOP -->

    <div class="d-flex justify-content-between align-items-center">

        <div>

            <h2>
                Lead Details
            </h2>

            <p class="text-muted">
                Customer conversation history
            </p>

        </div>

        <a href="/dashboard"
           class="btn btn-dark">

            Back

        </a>

    </div>

    <!-- LEAD INFO -->

    <div class="box">

        <h4 class="mb-4">
            Lead Information
        </h4>

        <div class="row">

            <div class="col-md-6 mb-3">

                <label class="fw-bold">
                    Name
                </label>

                <p th:text="${lead.name}"></p>

            </div>

            <div class="col-md-6 mb-3">

                <label class="fw-bold">
                    Email
                </label>

                <p th:text="${lead.email}"></p>

            </div>

            <div class="col-md-6 mb-3">

                <label class="fw-bold">
                    Phone
                </label>

                <p th:text="${lead.phone}"></p>

            </div>

            <div class="col-md-6 mb-3">

                <label class="fw-bold">
                    Status
                </label>

                <p th:text="${lead.status}"></p>

            </div>

            <div class="col-md-6 mb-3">

                <label class="fw-bold">
                    Source
                </label>

                <p th:text="${lead.source}"></p>

            </div>

            <div class="col-md-6 mb-3">

                <label class="fw-bold">
                    Follow Up
                </label>

                <p th:text="${lead.followUpDate}"></p>

            </div>

        </div>

    </div>

	<!-- LEAD ACTION -->

	<div class="box">

	    <h4 class="mb-3">
	        Lead Action
	    </h4>

	    <form th:action="@{/updateLeadStatus}"
	          method="post">

	        <input type="hidden"
	               name="leadId"
	               th:value="${lead.id}">

	        <div class="mb-3">

	            <label class="fw-bold">
	                Next Follow Up Date
	            </label>

	            <input type="date"
	                   name="followUpDate"
	                   class="form-control">

	        </div>

	        <button type="submit"
	                name="status"
	                value="INTERESTED"
	                class="btn btn-success">

	            <i class="bi bi-hand-thumbs-up"></i>

	            Interested

	        </button>

	        <button type="submit"
	                name="status"
	                value="NOT_INTERESTED"
	                class="btn btn-danger ms-2">

	            <i class="bi bi-hand-thumbs-down"></i>

	            Not Interested

	        </button>

	    </form>

	</div>
	
    <!-- ADD NOTE -->

    <div class="box">

        <h4 class="mb-3">
            Add Conversation Note
        </h4>

        <form th:action="@{/leads/{id}/notes(id=${lead.id})}"
              method="post">

            <textarea name="comment"
                      class="form-control mb-3"
                      rows="4"
                      placeholder="Write discussion details..."
                      required></textarea>

            <button class="btn btn-primary">

                <i class="bi bi-chat-left-text"></i>

                Save Note

            </button>

        </form>

    </div>

    <!-- NOTES HISTORY -->

    <div class="box">

        <h4 class="mb-4">
            Conversation History
        </h4>

		<hr>

		<h4 class="mt-4">
		    Lead Status Timeline
		</h4>

		<div th:if="${#lists.isEmpty(history)}">

		    <div class="alert alert-secondary">

		        No status history found

		    </div>

		</div>

		<div th:each="h : ${history}">

		    <div class="card mb-2 shadow-sm">

		        <div class="card-body">

		            <h6>

		                <span class="badge bg-danger"
		                      th:text="${h.oldStatus}">
		                </span>

		                →

		                <span class="badge bg-success"
		                      th:text="${h.newStatus}">
		                </span>

		            </h6>

		            <small class="text-muted"
		                   th:text="${h.changedAt}">
		            </small>

		        </div>

		    </div>

		</div>
		
        <!-- EMPTY -->

        <div th:if="${#lists.isEmpty(notes)}">

            <div class="alert alert-info">

                No conversation notes available

            </div>

        </div>

        <!-- NOTES -->

        <div th:each="note : ${notes}"
             class="note-box">

            <p class="mb-2"
               th:text="${note.comment}"></p>

            <small class="text-muted">

                Added on:
                <span th:text="${note.createdAt}"></span>

            </small>

        </div>

    </div>

</div>

</body>

</html>
