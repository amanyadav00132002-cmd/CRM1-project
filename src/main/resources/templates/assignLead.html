<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Assign Lead</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h3 class="mb-4">
            Assign Lead
        </h3>

        <form action="/assignLead"
              method="post">

            <input type="hidden"
                   name="leadId"
                   th:value="${lead.id}">

            <div class="mb-3">

                <label class="form-label">
                    Lead Name
                </label>

                <input type="text"
                       class="form-control"
                       th:value="${lead.name}"
                       readonly>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Select Employee
                </label>

                <select name="userId"
                        class="form-select">

						<option th:each="u : ${users}"
						        th:value="${u.id}"
						        th:text="${u.username}"
						        th:selected="${lead.assignedUser != null && lead.assignedUser.id == u.id}">
						</option>

                </select>

            </div>

            <button class="btn btn-primary">

                Assign Lead

            </button>

        </form>

    </div>

</div>

</body>
</html>
