<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Customers - CRM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:#f4f7fc;
}

.sidebar{
    height:100vh;
    background:#212529;
    padding:20px;
    color:white;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
    transition:0.3s;
}

.sidebar a:hover{
    background:#0d6efd;
}

.topbar{
    background:white;
    padding:18px;
    border-radius:12px;
    box-shadow:0px 2px 10px rgba(0,0,0,0.08);
}

.customer-box{
    background:white;
    border-radius:15px;
    padding:20px;
    margin-top:25px;
    box-shadow:0px 2px 10px rgba(0,0,0,0.08);
}

.badge-active{
    background:#198754;
    color:white;
    padding:6px 12px;
    border-radius:20px;
}

.badge-lost{
    background:#dc3545;
    color:white;
    padding:6px 12px;
    border-radius:20px;
}

.badge-new{
    background:#0d6efd;
    color:white;
    padding:6px 12px;
    border-radius:20px;
}

.table th,
.table td{
    vertical-align:middle;
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar">

        <h3 class="mb-4">CRM Panel</h3>

        <a href="/dashboard">
            <i class="bi bi-speedometer2"></i>
            Dashboard
        </a>

        <a href="/addLead">
            <i class="bi bi-person-plus"></i>
            Add Lead
        </a>

        <a href="/customers" class="bg-primary">
            <i class="bi bi-people"></i>
            Customers
        </a>

        <a href="/logout">
            <i class="bi bi-box-arrow-right"></i>
            Logout
        </a>

    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-4">

        <!-- Topbar -->
        <div class="topbar d-flex justify-content-between align-items-center">

            <div>

                <h3 class="mb-0">
                    Customer Management
                </h3>

                <small class="text-muted">
                    CRM Customer Records
                </small>

            </div>

            <div>

                <h5 class="mb-0">
                    Welcome,
                    <span th:text="${username}"></span>
                </h5>

            </div>

        </div>

        <!-- Customer Table -->
        <div class="customer-box">

            <div class="d-flex justify-content-between align-items-center mb-3">

                <h4>Customer List</h4>

                <div class="d-flex">

                    <!-- Search -->
                    <form action="/customers"
                          method="get"
                          class="d-flex me-2">

                        <input type="text"
                               name="keyword"
                               class="form-control me-2"
                               placeholder="Search Customer">

                        <button class="btn btn-dark">
                            Search
                        </button>

                    </form>

                    <!-- Add Button -->
                    <a href="/addLead"
                       class="btn btn-primary">

                        <i class="bi bi-plus-circle"></i>
                        Add Customer

                    </a>

                </div>

            </div>

            <div class="table-responsive">

                <table class="table table-hover table-bordered">

                    <thead class="table-dark">

                        <tr>

                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Source</th>
                            <th>Status</th>
                            <th>Follow Up</th>
                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody>

                        <!-- Customer Rows -->
                        <tr th:each="c : ${customers}">

                            <td th:text="${c.id}"></td>

                            <td>
                                <strong th:text="${c.name}"></strong>
                            </td>

                            <td th:text="${c.email}"></td>

                            <td th:text="${c.phone}"></td>

                            <td th:text="${c.source}"></td>

                            <td>

                                <span th:if="${c.status == 'Active'}"
                                      class="badge badge-active">
                                      Active
                                </span>

                                <span th:if="${c.status == 'Lost'}"
                                      class="badge badge-lost">
                                      Lost
                                </span>

                                <span th:if="${c.status == 'New'}"
                                      class="badge badge-new">
                                      New
                                </span>

                            </td>

                            <td th:text="${c.followUpDate}"></td>

                            <!-- Actions -->
                            <td>

                                <a th:href="@{/editLead/{id}(id=${c.id})}"
                                   class="btn btn-warning btn-sm">

                                   <i class="bi bi-pencil-square"></i>

                                </a>

                                <a th:href="@{/deleteLead/{id}(id=${c.id})}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('Delete this customer?')">

                                   <i class="bi bi-trash"></i>

                                </a>

                            </td>

                        </tr>

                        <!-- Empty Message -->
                        <tr th:if="${#lists.isEmpty(customers)}">

                            <td colspan="8"
                                class="text-center text-muted">

                                No Customers Found

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

</div>

</body>
</html>
