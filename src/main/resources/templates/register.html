<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>CRM Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:linear-gradient(135deg,#198754,#0d6efd);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    padding:20px;
}

.register-card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0px 5px 20px rgba(0,0,0,0.2);
}

.logo{
    font-size:55px;
    color:#198754;
}

.title{
    font-weight:bold;
    color:#212529;
}

.form-control{
    height:50px;
    border-radius:10px;
}

.btn-register{
    height:50px;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
}

.login-link{
    text-decoration:none;
    font-weight:500;
}

.login-link:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-5 col-lg-4">

            <div class="register-card">

                <!-- LOGO -->
                <div class="text-center mb-3">

                    <i class="bi bi-person-plus-fill logo"></i>

                </div>

                <!-- TITLE -->
                <h2 class="text-center title mb-4">

                    Create Account

                </h2>

                <!-- ERROR MESSAGE -->
                <div th:if="${error}"
                     class="alert alert-danger text-center"
                     th:text="${error}">

                </div>

                <!-- SUCCESS MESSAGE -->
                <div th:if="${success}"
                     class="alert alert-success text-center"
                     th:text="${success}">

                </div>

                <!-- FORM -->
                <form th:action="@{/registerForm}"
                      method="post">

                    <!-- USERNAME -->
                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input type="text"
                               name="username"
                               class="form-control"
                               placeholder="Enter Username"
                               required>

                    </div>

                    <!-- EMAIL -->
                    <div class="mb-3">

                        <label class="form-label">
                            Email Address
                        </label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="Enter Email"
                               required>

                    </div>

                    <!-- PASSWORD -->
                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Enter Password"
                               required>

                    </div>

                    <!-- CONFIRM PASSWORD -->
                    <div class="mb-4">

                        <label class="form-label">
                            Confirm Password
                        </label>

                        <input type="password"
                               name="confirmPassword"
                               class="form-control"
                               placeholder="Confirm Password"
                               required>

                    </div>

                    <!-- REGISTER BUTTON -->
                    <button type="submit"
                            class="btn btn-success w-100 btn-register">

                        <i class="bi bi-check-circle"></i>

                        Register

                    </button>

                </form>

                <!-- LOGIN LINK -->
                <div class="text-center mt-4">

                    <span class="text-muted">
                        Already have an account?
                    </span>

                    <a th:href="@{/}"
                       class="login-link">

                        Login

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
